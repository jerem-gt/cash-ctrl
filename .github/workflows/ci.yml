name: Build, Release & Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    name: 🧪 CI & Tests
    runs-on: ubuntu-latest
    container: node:24.15.0-alpine
    steps:
      - name: Install system deps
        run: apk add --no-cache git g++ make python3 tar

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node cache
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Test with coverage
        run: |
          npm run test:coverage --workspace=server
          npm run test:coverage --workspace=client

      - name: Build
        run: |
          npm run build --workspace=server
          npm run build --workspace=client

      - name: Prune dev deps
        run: npm prune --omit=dev

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-assets
          path: |
            node_modules
            server/dist
            server/coverage/lcov.info
            client/dist
            client/coverage/lcov.info

  sonar:
    name: 🛡️ SonarCloud Analysis
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build assets
        uses: actions/download-artifact@v8
        with:
          name: build-assets

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  release:
    name: 🚀 Semantic Release
    needs: [ci]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          branches: |
            [
              "main",
              { "name": "develop", "prerelease": "dev" }
            ]
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    name: 📦 Docker Build & Push
    needs: [ci, release]
    # On build si on est sur PR, OU si une nouvelle release a été publiée sur main
    if: |
      github.event_name == 'pull_request' || 
      (needs.release.outputs.new_release_published == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Download build assets
        uses: actions/download-artifact@v8
        with:
          name: build-assets

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag précis (ex: 1.1.0 ou 1.2.0-dev.1)
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_release_version }}
            # Le tag 'latest' ne bouge que lors d'un push sur main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Un tag 'dev' pratique pour pull la dernière version de develop
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,prefix=sha-

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ needs.release.outputs.new_release_version || 'dev' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prune-images:
    name: 🧹 Prune Dev Images
    needs: [ build-and-push ]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old dev images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: 'container'
          min-versions-to-keep: 5 # On garde les 5 dernières versions de dev
          delete-only-pre-release-versions: true # On ne touche pas aux versions stables !