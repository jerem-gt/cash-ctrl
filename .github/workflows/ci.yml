name: Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    runs-on: ubuntu-latest
    container: node:24.15.0-alpine
    steps:
      - name: Install system deps
        run: apk add --no-cache git g++ make python3

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install deps
        run: npm ci # NOSONAR — server native addons (better-sqlite3, bcrypt) require node-gyp scripts

      - name: Test server with coverage
        run: npm run test:coverage --workspace=server

      - name: Test client with coverage
        run: npm run test:coverage --workspace=client

      - name: Build
        run: |
          npm run build --workspace=server
          npm run build --workspace=client

      - name: Prune dev deps
        run: npm prune --omit=dev

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: |
            node_modules
            !node_modules/@cashctrl
            server/dist
            server/coverage/lcov.info
            client/dist
            client/coverage/lcov.info

  sonar:
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v8
        with:
          name: build

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  build-and-push:
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
