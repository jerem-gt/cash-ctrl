<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CashCtrl" />
    <meta name="theme-color" content="#eaeef2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0c1a21" media="(prefers-color-scheme: dark)" />
    <title>CashCtrl</title>
    <script>
      // Anti-FOUC : applique le thème avant le premier paint.
      (function () {
        try {
          const stored = localStorage.getItem('cashctrl.theme');
          const mode = stored === 'light' || stored === 'dark' ? stored : 'system';
          const dark =
            mode === 'dark' ||
            (mode === 'system' &&
              globalThis.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch {
          // localStorage indisponible ou bloqué : repli explicite en mode clair.
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
