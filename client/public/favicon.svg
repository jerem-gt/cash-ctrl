<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Définition du gradient de fond bleu, inspiré de la couleur #2563EB -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" /> <!-- Bleu plus clair en haut -->
      <stop offset="100%" stop-color="#1E3A8A" /> <!-- Bleu plus foncé en bas -->
    </linearGradient>

    <!-- Définition d'une légère lueur externe pour l'effet "stylisé" -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond de l'icône : Carré aux bords arrondis avec gradient -->
  <rect width="512" height="512" rx="110" fill="url(#blueGradient)" />

  <!-- Groupe contenant le logo blanc avec effet de lueur -->
  <g fill="none" stroke="white" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">

    <!-- Partie du logo en forme de 'C' stylisé -->
    <path d="M 380 160 A 160 160 0 1 0 380 352" />

    <!-- Ligne de tendance avec la flèche ascendante -->
    <path d="M 170 340 L 260 250 L 330 320 L 410 240 M 360 240 L 410 240 L 410 290" />

  </g>
</svg>
