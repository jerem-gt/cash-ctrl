services:
  cashctrl:
    image: ghcr.io/jerem-gt/cash-ctrl:latest
    user: "${PUID}:${PGID}"
    container_name: cash-ctrl
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /volume1/data/cash-ctrl:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/data
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SECURE_COOKIE=true
      - LOG_LEVEL=INFO
networks:
  mynet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
          gateway: 172.18.0.1