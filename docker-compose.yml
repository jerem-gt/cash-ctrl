services:
  cashctrl:
    image: ghcr.io/jerem-gt/cash-ctrl:latest
    container_name: cash-ctrl
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /volume1/data/cash-ctrl:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/data
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - PUID=${PUID}
      - PGID=${PGID}